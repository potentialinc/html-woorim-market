<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>관리자 로그인 | 우림마켓 Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: -apple-system, 'Pretendard', BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFFFF; color: #1D1D1F; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
  .input { background: #FFFFFF; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; color: #1D1D1F; font-size: 14px; padding: 10px 12px; height: 44px; width: 100%; transition: border-color 150ms ease; outline: none; }
  .input::placeholder { color: #AEAEB2; }
  .input:focus { border-color: #0071E3; box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }
  .btn-primary { background: #0071E3; color: #FFFFFF; font-size: 14px; font-weight: 400; padding: 10px 20px; border-radius: 6px; border: none; width: 100%; height: 44px; cursor: pointer; transition: background 150ms ease; }
  .btn-primary:hover { background: #0059B3; }
  .input-label { font-size: 13px; font-weight: 500; color: #6E6E73; margin-bottom: 4px; display: block; }
  .error-text { font-size: 12px; color: #FF3B30; margin-top: 4px; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div style="width:100%;max-width:400px;padding:0 16px;">
  <!-- Brand -->
  <div style="text-align:center;margin-bottom:32px;">
    <div style="display:inline-flex;align-items:center;gap:6px;">
      <span style="font-size:16px;font-weight:500;color:#1D1D1F;">우림마켓</span>
      <span style="font-size:11px;color:#AEAEB2;font-weight:400;">Admin</span>
    </div>
  </div>

  <!-- Form Card -->
  <div style="background:#FFFFFF;border:0.5px solid rgba(0,0,0,0.08);border-radius:8px;padding:32px;">
    <h1 style="font-size:18px;font-weight:500;color:#1D1D1F;margin-bottom:24px;">로그인</h1>

    <div style="margin-bottom:16px;">
      <label class="input-label" for="email">이메일</label>
      <input class="input" id="email" type="email" placeholder="admin@woorim.co.kr" autocomplete="email">
    </div>

    <div style="margin-bottom:24px;">
      <label class="input-label" for="password">비밀번호</label>
      <div style="position:relative;">
        <input class="input" id="password" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" style="padding-right:44px;">
        <button onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#AEAEB2;display:flex;align-items:center;" aria-label="비밀번호 표시/숨기기">
          <iconify-icon icon="mdi:eye-outline" id="eyeIcon" width="18"></iconify-icon>
        </button>
      </div>
    </div>

    <!-- Error message (hidden by default) -->
    <div id="errorMsg" style="display:none;background:#FFF5F5;border:0.5px solid rgba(255,59,48,0.2);border-radius:6px;padding:10px 12px;margin-bottom:16px;">
      <span style="font-size:12px;color:#FF3B30;">이메일 또는 비밀번호가 올바르지 않습니다.</span>
    </div>

    <button class="btn-primary" onclick="handleLogin()">
      <span id="loginText">로그인</span>
    </button>
  </div>

  <!-- Footer link -->
  <div style="text-align:center;margin-top:16px;">
    <a href="#" style="font-size:13px;color:#0071E3;text-decoration:none;">비밀번호를 잊으셨나요?</a>
  </div>
</div>

<script>
function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.setAttribute('icon', 'mdi:eye-off-outline');
  } else {
    pw.type = 'password';
    icon.setAttribute('icon', 'mdi:eye-outline');
  }
}

function handleLogin() {
  const btn = document.querySelector('.btn-primary');
  const text = document.getElementById('loginText');
  text.innerHTML = '<iconify-icon icon="mdi:loading" width="16" style="animation:spin 1s linear infinite;"></iconify-icon>';
  setTimeout(() => {
    text.textContent = '로그인';
    document.getElementById('errorMsg').style.display = 'block';
  }, 1200);
}
</script>
</body>
</html>
