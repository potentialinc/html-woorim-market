<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우림마켓 - 9 Design Variations Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
  body { background: #0a0a0a; color: #fff; min-height: 100vh; }

  .header { text-align: center; padding: 48px 24px 32px; }
  .header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .header p { font-size: 15px; color: #666; margin-bottom: 24px; }
  .header .instruction {
    display: inline-block;
    padding: 10px 24px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 12px;
    font-size: 14px;
    color: #a5b4fc;
  }

  .variations { max-width: 1500px; margin: 0 auto; padding: 0 32px 80px; }

  .variation-section {
    margin-bottom: 80px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
  }
  .variation-section::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: var(--accent-gradient);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.3;
    pointer-events: none;
  }
  .variation-section:hover::before { opacity: 0.6; }

  .variation-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 28px 36px;
    background: var(--header-bg);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .variation-header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 300px; height: 100%;
    background: var(--accent-gradient);
    opacity: 0.06;
    filter: blur(40px);
  }

  .var-letter {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 16px var(--accent-shadow);
    position: relative;
    z-index: 1;
  }
  .var-info { flex: 1; position: relative; z-index: 1; }
  .var-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .var-info p { font-size: 14px; color: #999; line-height: 1.4; }
  .var-info .tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .var-info .tag {
    padding: 4px 12px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
    border: 1px solid var(--tag-border);
    color: var(--tag-color);
    background: var(--tag-bg);
  }

  .var-select-btn {
    padding: 10px 28px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .var-select-btn:hover {
    background: #fff;
    color: #000;
    border-color: #fff;
  }

  .pages-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    min-width: 0;
  }

  .page-cell {
    border-right: 1px solid rgba(255,255,255,0.04);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .page-cell:last-child { border-right: none; }
  .page-cell:hover { background: rgba(255,255,255,0.02); }

  .page-label {
    text-align: center;
    padding: 12px 8px 8px;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .page-preview {
    width: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* Mobile pages (home, category, product-detail) */
  .page-preview.mobile {
    height: 380px;
  }
  .page-preview.mobile iframe {
    width: 375px;
    height: 812px;
    border: none;
    pointer-events: none;
    transform: scale(0.42);
    transform-origin: top center;
  }

  /* Desktop pages (admin dashboard) - spans full width */
  .page-cell.desktop-cell {
    grid-column: 1 / -1;
  }
  .page-preview.desktop {
    height: 480px;
    overflow: hidden;
  }
  .page-preview.desktop iframe {
    width: 1440px;
    height: 900px;
    border: none;
    pointer-events: none;
    transform: scale(0.92);
    transform-origin: top center;
  }

  .page-open-link {
    display: block;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: #666;
    text-decoration: none;
    transition: color 0.2s;
  }
  .page-open-link:hover { color: #a5b4fc; }

  @media (max-width: 1200px) {
    .pages-grid { grid-template-columns: repeat(2, 1fr); }
    .page-cell:nth-child(2) { border-right: none; }
    .page-cell:nth-child(2) { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .page-cell:nth-child(1) { border-bottom: 1px solid rgba(255,255,255,0.04); }
  }
  @media (max-width: 700px) {
    .pages-grid { grid-template-columns: 1fr; }
    .page-cell { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.04); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>우림마켓 Design Showcase</h1>
  <p>9개 디자인 시스템 중 하나를 선택해주세요</p>
  <div class="instruction">각 변형의 4개 페이지(홈, 카테고리, 상품상세, 어드민)를 비교한 뒤 <strong>하나의 스타일</strong>을 골라주세요</div>
</div>

<div class="variations" id="variations"></div>

<script>
const V = [
  { id:'A', name:'Dark Vibrant',      desc:'다크 네이비 배경에 네온 퍼플/코랄 그라데이션 액센트',   color:'#845EF7', color2:'#FF6B6B', bg:'#0B0F1A', headerBg:'#0d1120',
    tags:['다크 테마','네온 글로우','모던 감성','Linear/Vercel 스타일'] },
  { id:'B', name:'Warm Playful',      desc:'따뜻한 크림 배경에 오렌지 포인트 — 식욕을 자극하는 컬러',  color:'#FF6B35', color2:'#FFB300', bg:'#FFFBF5', headerBg:'#1a1510',
    tags:['따뜻한 톤','오렌지 액센트','친근한 느낌','마켓컬리 감성'] },
  { id:'C', name:'Editorial Minimal', desc:'퓨어 화이트에 극도로 절제된 디자인 — Apple Store 스타일', color:'#0071E3', color2:'#64D2FF', bg:'#FFFFFF', headerBg:'#0d1118',
    tags:['미니멀','헤어라인 보더','프리미엄','Apple 감성'] },
  { id:'D', name:'Glass Futuristic',  desc:'다크 그라데이션 배경에 글래스모피즘과 이리데슨트 효과',  color:'#00D4FF', color2:'#FF6EC7', bg:'#0F0F23', headerBg:'#0a0a1a',
    tags:['글래스모피즘','이리데슨트','미래적','backdrop-blur'] },
  { id:'E', name:'Nature Organic',    desc:'따뜻한 스톤 배경에 세이지 그린 — 자연/유기농 느낌',     color:'#5B7553', color2:'#C4704B', bg:'#F5F0EB', headerBg:'#141210',
    tags:['자연/유기농','세리프 서체','어스톤','프리미엄 식품'] },
  { id:'F', name:'Neo Brutalist',     desc:'흑백 기반에 노란 블록 컬러 — 강렬하고 직각적인 디자인',  color:'#FFE500', color2:'#FF3333', bg:'#FFFFFF', headerBg:'#141414',
    tags:['브루탈리즘','하드 쉐도우','직각 코너','대담한 타이포'] },
  { id:'G', name:'Soft Pastel',       desc:'라벤더 배경에 소프트 퍼플 — 부드럽고 친근한 파스텔 톤',  color:'#7C5CFC', color2:'#FFB3C6', bg:'#F8F5FF', headerBg:'#12101a',
    tags:['파스텔','소프트 퍼플','둥근 코너','귀여운 감성'] },
  { id:'H', name:'Premium Gold',      desc:'차콜 다크 배경에 골드/샴페인 액센트 — 럭셔리 포지셔닝',  color:'#C9A96E', color2:'#E8D5B7', bg:'#1A1A1A', headerBg:'#111008',
    tags:['다크 럭셔리','골드 액센트','세리프 서체','프리미엄'] },
  { id:'I', name:'Fresh Market',      desc:'화이트 배경에 비비드 그린 — 신선함과 에너지를 강조',     color:'#00B853', color2:'#FFD600', bg:'#FFFFFF', headerBg:'#0a140a',
    tags:['신선한 그린','비비드','에너지틱','식품 마켓 감성'] },
];

const pages = [
  { suffix:'01-home', label:'홈', type:'mobile' },
  { suffix:'02-category', label:'카테고리', type:'mobile' },
  { suffix:'03-product-detail', label:'상품 상세', type:'mobile' },
  { suffix:'04-admin-dashboard', label:'어드민 대시보드', type:'desktop' },
];

document.getElementById('variations').innerHTML = V.map(v => `
  <div class="variation-section" style="--accent-gradient:linear-gradient(135deg,${v.color},${v.color2});--header-bg:${v.headerBg};--accent-shadow:${v.color}40;--tag-border:${v.color}30;--tag-color:${v.color};--tag-bg:${v.color}10;">
    <div class="variation-header">
      <div class="var-letter" style="background:linear-gradient(135deg,${v.color},${v.color2});">${v.id}</div>
      <div class="var-info">
        <h2 style="color:${v.color};">${v.name}</h2>
        <p>${v.desc}</p>
        <div class="tags">${v.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="pages-grid">
      ${pages.map(p => `
        <div class="page-cell${p.type==='desktop'?' desktop-cell':''}" onclick="window.open('${v.id}-${p.suffix}.html','_blank')">
          <div class="page-label">${p.label}</div>
          <div class="page-preview ${p.type}" style="background:${v.bg};">
            <iframe src="${v.id}-${p.suffix}.html" loading="lazy"></iframe>
          </div>
          <a href="${v.id}-${p.suffix}.html" target="_blank" class="page-open-link">새 탭에서 열기 →</a>
        </div>
      `).join('')}
    </div>
  </div>
`).join('');
</script>

</body>
</html>
