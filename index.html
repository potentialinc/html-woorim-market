<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공직 (Gongjik) — Design Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#333;padding:40px 20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:28px;margin-bottom:8px}
.subtitle{color:#666;margin-bottom:32px;font-size:15px}
.section{margin-bottom:40px}
.section h2{font-size:20px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #eee}
.section h2 .badge{font-size:12px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.badge-b{background:#FFF0E8;color:#FF6B35}
.badge-c{background:#F0F0FF;color:#007AFF}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
a.card{display:block;padding:14px 18px;background:#fff;border:1px solid #e5e5e7;border-radius:10px;text-decoration:none;color:#333;transition:all .15s}
a.card:hover{border-color:#007AFF;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card .name{font-weight:600;font-size:14px;margin-bottom:4px}
.card .path{font-size:12px;color:#999}
</style>
</head>
<body>
<div class="container">
<h1>공직 (Gongjik) Design Preview</h1>
<p class="subtitle">우림에프엔비 F&B D2C Commerce — 62 screens (40 consumer + 22 admin)</p>

<div class="section">
<h2>소비자 앱 <span class="badge badge-b">Variation B — Warm Playful</span></h2>
<div class="grid" id="consumer"></div>
</div>

<div class="section">
<h2>어드민 대시보드 <span class="badge badge-c">Variation C — Pure White</span></h2>
<div class="grid" id="admin"></div>
</div>
</div>

<script>
const consumer=[
["01-splash","스플래시"],["02-login","로그인"],["03-register","회원가입"],["04-password-reset","비밀번호 재설정"],["05-sms-verification","SMS 인증"],["06-terms-reconsent","약관 재동의"],
["07-home","홈"],["08-category","카테고리"],["09-product-detail","상품 상세"],
["10-cart","장바구니"],["11-checkout","주문서"],["12-order-complete","주문 완료"],
["13-order-list","주문 내역"],["14-order-detail","주문 상세"],["15-cancel-request","취소 신청"],["16-exchange-request","교환 신청"],["17-refund-request","환불 신청"],
["18-mypage-main","마이페이지"],["19-profile-edit","프로필 수정"],["20-address-list","배송지 목록"],["21-address-edit","배송지 수정"],["22-coupons","쿠폰"],["23-points-history","포인트 내역"],["24-wishlist","찜 목록"],["25-recently-viewed","최근 본 상품"],["26-inquiry-list","1:1 문의"],["27-inquiry-write","문의 작성"],["28-notice-list","공지사항"],["29-notice-detail","공지 상세"],["30-terms-list","약관 목록"],["31-privacy-policy","개인정보처리방침"],["32-notification-settings","알림 설정"],["33-withdrawal","회원 탈퇴"],["34-review-write","리뷰 작성"],["35-exchange-refund-history","교환/환불 내역"],
["36-search","검색"],["37-search-results","검색 결과"],
["38-promotion-list","기획전 목록"],["39-promotion-detail","기획전 상세"],
["40-faq","자주묻는 질문"]
];
const admin=[
["A01-admin-login","관리자 로그인"],["A02-admin-dashboard","대시보드"],["A03-members-list","회원 관리"],["A04-member-detail","회원 상세"],["A05-admin-accounts","관리자 계정"],
["A06-products-list","상품 목록"],["A07-product-register","상품 등록"],["A08-product-edit","상품 수정"],
["A09-orders-list","주문 관리"],["A10-shipping-list","배송 관리"],["A11-cancel-refund-list","취소/환불"],["A12-exchange-list","교환 관리"],
["A13-coupons-list","쿠폰 관리"],["A14-events-list","이벤트"],["A15-promotions-list","기획전"],["A16-notices-list","공지 관리"],["A17-reviews-list","리뷰 관리"],["A18-inquiries-list","문의 관리"],
["A19-sales-report","매출/정산"],["A20-categories-manage","카테고리"],["A21-data-export","데이터 내보내기"],["A22-faq-list","FAQ 관리"]
];
function render(arr,id,dir){const el=document.getElementById(id);arr.forEach(([f,n])=>{el.innerHTML+=`<a class="card" href="${dir}/${f}.html"><div class="name">${n}</div><div class="path">${dir}/${f}.html</div></a>`})}
render(consumer,"consumer","consumer");
render(admin,"admin","admin");
</script>
</body>
</html>
