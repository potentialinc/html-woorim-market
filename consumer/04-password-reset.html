<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="공직 비밀번호 찾기">
<title>공직 - 비밀번호 찾기</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header {
    height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 0; position: sticky; top: 0; z-index: 10;
  }
  .input-field {
    width: 100%; height: 48px; background: #FFFFFF; border: 1.5px solid #F0E0D0;
    border-radius: 12px; font-size: 14px; color: #3E2723;
    padding: 12px 16px; outline: none; transition: border-color 150ms ease; font-family: inherit;
  }
  .input-field::placeholder { color: #A1887F; }
  .input-field:focus { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
  .btn-primary {
    width: 100%; height: 50px; background: #FF6B35; color: #FFFFFF;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,53,0.2);
    transition: all 150ms ease-out; font-family: inherit;
  }
  .password-wrap { position: relative; }
  .password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="phone-screen">
    <!-- Header -->
    <header class="sub-header">
      <a href="02-login.html" style="padding:4px;display:flex;" aria-label="뒤로가기">
        <iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon>
      </a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">비밀번호 찾기</h1>
      <div style="width:32px;"></div>
    </header>

    <!-- Step 1: Email -->
    <main id="step1" style="padding:32px 20px;text-align:center;">
      <iconify-icon icon="mdi:lock-reset" width="48" style="color:#FF6B35;" aria-hidden="true"></iconify-icon>
      <h2 style="font-size:24px;font-weight:600;color:#3E2723;margin-top:16px;">비밀번호 찾기</h2>
      <p style="font-size:14px;color:#6D4C41;margin-top:8px;line-height:1.6;">가입하신 이메일 주소를 입력하시면<br>재설정 링크를 보내드립니다.</p>

      <div style="margin-top:32px;text-align:left;">
        <label for="reset-email" style="font-size:13px;font-weight:500;color:#6D4C41;margin-bottom:6px;display:block;">이메일</label>
        <input id="reset-email" type="email" class="input-field" placeholder="가입하신 이메일을 입력하세요" autocomplete="email">
      </div>
      <button type="button" class="btn-primary" style="margin-top:16px;" onclick="sendResetLink()">재설정 링크 발송</button>

      <!-- Success State (hidden initially) -->
      <div id="success-state" style="display:none;margin-top:32px;padding:20px;background:#E8F5E9;border-radius:16px;">
        <iconify-icon icon="mdi:check-circle" width="40" style="color:#43A047;" aria-hidden="true"></iconify-icon>
        <p style="font-size:15px;font-weight:600;color:#2E7D32;margin-top:8px;">이메일을 확인해 주세요</p>
        <p style="font-size:13px;color:#6D4C41;margin-top:4px;">abc***@gmail.com으로 재설정 링크를 보냈습니다</p>
      </div>
    </main>

    <!-- Step 2: New Password (deep-link) -->
    <section id="step2" style="display:none;padding:32px 20px;">
      <h2 style="font-size:24px;font-weight:600;color:#3E2723;margin-bottom:24px;">새 비밀번호 설정</h2>
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:500;color:#6D4C41;margin-bottom:6px;display:block;">새 비밀번호</label>
        <div class="password-wrap">
          <input id="new-pw" type="password" class="input-field" placeholder="새 비밀번호를 입력하세요" style="padding-right:48px;">
          <button type="button" class="password-toggle" onclick="togglePw('new-pw')" aria-label="비밀번호 표시/숨기기">
            <iconify-icon icon="mdi:eye-off-outline" width="22" style="color:#A1887F;"></iconify-icon>
          </button>
        </div>
        <p style="font-size:11px;color:#A1887F;margin-top:4px;">8자 이상, 영문+숫자+특수문자 중 2종 이상</p>
      </div>
      <div style="margin-bottom:24px;">
        <label style="font-size:13px;font-weight:500;color:#6D4C41;margin-bottom:6px;display:block;">비밀번호 확인</label>
        <div class="password-wrap">
          <input id="confirm-pw" type="password" class="input-field" placeholder="새 비밀번호를 다시 입력하세요" style="padding-right:48px;">
          <button type="button" class="password-toggle" onclick="togglePw('confirm-pw')" aria-label="비밀번호 확인 표시/숨기기">
            <iconify-icon icon="mdi:eye-off-outline" width="22" style="color:#A1887F;"></iconify-icon>
          </button>
        </div>
      </div>
      <button type="button" class="btn-primary" onclick="changePassword()">비밀번호 변경</button>
    </section>

    <!-- Demo: Show Step 2 button -->
    <div style="padding:16px 20px;border-top:1px solid #F0E0D0;margin-top:16px;">
      <button onclick="document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';" style="background:none;border:1px dashed #A1887F;color:#A1887F;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;width:100%;font-family:inherit;">
        [데모] 새 비밀번호 설정 화면 보기
      </button>
    </div>
  </div>
<script>
function sendResetLink() {
  const email = document.getElementById('reset-email').value;
  if (!email) return;
  document.getElementById('success-state').style.display = 'block';
}
function changePassword() {
  alert('비밀번호가 변경되었습니다');
  window.location.href = '02-login.html';
}
function togglePw(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
