<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="우림마켓 장바구니">
<title>우림마켓 - 장바구니</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header {
    height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 0; position: sticky; top: 0; z-index: 10;
  }
  .custom-check {
    width: 20px; height: 20px; border: 1.5px solid #F0E0D0;
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 150ms; cursor: pointer;
  }
  .custom-check.checked { background: #FF6B35; border-color: #FF6B35; }
  .qty-btn {
    width: 32px; height: 32px; border: 1.5px solid #F0E0D0; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: #FFFFFF; cursor: pointer; font-size: 16px;
  }
  .checkout-bar {
    position: fixed; bottom: 0; left: 0; right: 0; max-width: 375px; margin: 0 auto;
    background: #FFFFFF; border-top: 1px solid #F0E0D0;
    padding: 12px 16px; box-shadow: 0 -4px 16px rgba(62,39,35,0.06);
    z-index: 100;
  }
  .btn-primary {
    width: 100%; height: 50px; background: #FF6B35; color: #FFFFFF;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 150ms;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="phone-screen">
    <header class="sub-header">
      <a href="07-home.html" style="padding:4px;display:flex;" aria-label="뒤로가기">
        <iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon>
      </a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">장바구니 (3)</h1>
      <button style="background:none;border:none;cursor:pointer;padding:4px;" aria-label="선택 항목 삭제">
        <iconify-icon icon="mdi:delete-outline" width="24" style="color:#A1887F;"></iconify-icon>
      </button>
    </header>

    <!-- Select All Row -->
    <div style="padding:12px 16px;background:#FFFFFF;border-bottom:1px solid #F0E0D0;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="toggleSelectAll()">
        <div class="custom-check checked" id="check-all">
          <iconify-icon icon="mdi:check" width="14" style="color:#FFFFFF;"></iconify-icon>
        </div>
        <span style="font-size:14px;font-weight:500;color:#3E2723;">전체선택</span>
      </div>
      <button style="background:none;border:none;color:#A1887F;font-size:13px;cursor:pointer;font-family:inherit;">선택삭제</button>
    </div>

    <!-- Free Shipping Banner -->
    <div style="margin:10px 16px 0;background:#E8F5E9;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;">
      <iconify-icon icon="mdi:truck-delivery-outline" width="20" style="color:#2E7D32;flex-shrink:0;"></iconify-icon>
      <p style="font-size:13px;font-weight:500;color:#2E7D32;line-height:1.4;">무료배송 상품 포함 — 전체 무료배송 적용</p>
    </div>

    <!-- Cart Items -->
    <div style="margin-top:8px;">
      <!-- Item 1 -->
      <div style="background:#FFFFFF;padding:14px 16px;border-bottom:1px solid #F5EDE4;position:relative;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div class="custom-check checked" onclick="toggleItem(this)">
            <iconify-icon icon="mdi:check" width="14" style="color:#FFFFFF;"></iconify-icon>
          </div>
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="우림 전통 고추장 500g" style="width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;">
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:500;color:#3E2723;line-height:1.3;margin-bottom:3px;">우림 전통 고추장 500g</p>
            <p style="font-size:12px;color:#A1887F;margin-bottom:6px;">옵션: 500g</p>
            <p style="font-size:12px;color:#A1887F;text-decoration:line-through;">12,000원</p>
            <p style="font-size:14px;font-weight:700;color:#3E2723;">8,900원</p>
            <div style="margin-top:4px;display:flex;gap:4px;">
              <span style="background:#E8F5E9;color:#2E7D32;font-size:10px;font-weight:600;padding:2px 6px;border-radius:9999px;">무료배송</span>
            </div>
          </div>
          <button style="position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;padding:4px;" aria-label="삭제">
            <iconify-icon icon="mdi:close" width="18" style="color:#A1887F;"></iconify-icon>
          </button>
        </div>
        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:8px;">
          <div class="qty-btn" onclick="changeQty('qty1',-1)" role="button" aria-label="수량 감소">−</div>
          <span id="qty1" style="font-size:14px;font-weight:600;color:#3E2723;min-width:20px;text-align:center;">2</span>
          <div class="qty-btn" onclick="changeQty('qty1',1)" role="button" aria-label="수량 증가">+</div>
        </div>
      </div>

      <!-- Item 2 -->
      <div style="background:#FFFFFF;padding:14px 16px;border-bottom:1px solid #F5EDE4;position:relative;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div class="custom-check checked" onclick="toggleItem(this)">
            <iconify-icon icon="mdi:check" width="14" style="color:#FFFFFF;"></iconify-icon>
          </div>
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Doenjang.jpg" alt="우림 된장 1kg" style="width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;">
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:500;color:#3E2723;line-height:1.3;margin-bottom:3px;">우림 된장 1kg</p>
            <p style="font-size:12px;color:#A1887F;margin-bottom:6px;">옵션: 1kg</p>
            <p style="font-size:12px;color:#A1887F;text-decoration:line-through;">15,000원</p>
            <p style="font-size:14px;font-weight:700;color:#3E2723;">9,800원</p>
          </div>
          <button style="position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;padding:4px;" aria-label="삭제">
            <iconify-icon icon="mdi:close" width="18" style="color:#A1887F;"></iconify-icon>
          </button>
        </div>
        <div style="display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:8px;">
          <div class="qty-btn" onclick="changeQty('qty2',-1)" role="button" aria-label="수량 감소">−</div>
          <span id="qty2" style="font-size:14px;font-weight:600;color:#3E2723;min-width:20px;text-align:center;">1</span>
          <div class="qty-btn" onclick="changeQty('qty2',1)" role="button" aria-label="수량 증가">+</div>
        </div>
      </div>

      <!-- Item 3 (sold out) -->
      <div style="background:#FFFFFF;padding:14px 16px;border-bottom:1px solid #F5EDE4;position:relative;opacity:0.5;">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          <div class="custom-check" style="cursor:not-allowed;">
            <iconify-icon icon="mdi:check" width="14" style="color:#FFFFFF;"></iconify-icon>
          </div>
          <div style="position:relative;flex-shrink:0;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/Cheongyang_chili_and_gochujang.jpg" alt="청양고추 핫소스 250ml" style="width:80px;height:80px;border-radius:12px;object-fit:cover;">
            <div style="position:absolute;inset:0;background:rgba(62,39,35,0.5);border-radius:12px;display:flex;align-items:center;justify-content:center;">
              <span style="color:#fff;font-size:12px;font-weight:700;">품절</span>
            </div>
          </div>
          <div style="flex:1;min-width:0;">
            <p style="font-size:14px;font-weight:500;color:#3E2723;line-height:1.3;margin-bottom:3px;">청양고추 핫소스 250ml</p>
            <p style="font-size:12px;color:#A1887F;margin-bottom:6px;">옵션: 250ml</p>
            <span style="background:#FFEBEE;color:#E53935;font-size:11px;font-weight:600;padding:2px 8px;border-radius:9999px;">품절</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Price Summary -->
    <div style="background:#FFFFFF;border-radius:16px;margin:12px 16px;padding:16px;box-shadow:0 4px 12px rgba(62,39,35,0.06);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:14px;color:#6D4C41;">상품 합계</span>
        <span style="font-size:14px;color:#3E2723;font-weight:500;">27,600원</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:14px;color:#6D4C41;">배송비</span>
        <span style="font-size:14px;color:#43A047;font-weight:500;">무료</span>
      </div>
      <div style="height:1px;background:#F5EDE4;margin:10px 0;"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:14px;font-weight:600;color:#3E2723;">최종 결제 금액</span>
        <span style="font-size:18px;font-weight:700;color:#FF6B35;">27,600원</span>
      </div>
    </div>
  </div>

  <!-- Checkout Bar -->
  <div class="checkout-bar">
    <a href="11-checkout.html" style="display:block;">
      <button class="btn-primary">주문하기 (선택 2개 · 27,600원)</button>
    </a>
  </div>
<script>
function changeQty(id, delta) {
  const el = document.getElementById(id);
  let v = parseInt(el.textContent) + delta;
  if (v < 1) v = 1;
  el.textContent = v;
}
function toggleItem(el) {
  el.classList.toggle('checked');
}
function toggleSelectAll() {
  const allChecked = document.getElementById('check-all').classList.contains('checked');
  document.querySelectorAll('.custom-check').forEach(c => {
    if (allChecked) c.classList.remove('checked'); else c.classList.add('checked');
  });
}
</script>
</body>
</html>
