<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우림마켓 - 리뷰 작성</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header { height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; position: sticky; top: 0; z-index: 10; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 28px; transition: transform 0.1s; }
  .star-btn:active { transform: scale(1.2); }
  .media-add { width: 70px; height: 70px; border: 1.5px dashed #D4C4B8; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; background: #FAFAFA; flex-shrink: 0; }
  .media-thumb { width: 70px; height: 70px; border-radius: 10px; overflow: hidden; position: relative; flex-shrink: 0; }
  .form-textarea { width: 100%; border: 1.5px solid #E8DDD2; border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #3E2723; background: #FFFFFF; font-family: inherit; outline: none; resize: none; }
  .form-textarea:focus { border-color: #FF6B35; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 375px; margin: 0 auto; background: #FFFBF5; border-top: 1px solid #E8DDD2; padding: 10px 16px 20px; z-index: 10; }
</style>
</head>
<body>
<div class="phone-screen">
    <div style="height:36px;padding:10px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#FFFBF5;">
      <span style="font-size:13px;font-weight:600;color:#3E2723;">9:41</span>
      <div style="display:flex;gap:5px;align-items:center;"><iconify-icon icon="mdi:signal-cellular-3" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:wifi" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:battery" width="17" style="color:#3E2723;"></iconify-icon></div>
    </div>
    <header class="sub-header">
      <a href="13-order-list.html" style="padding:4px;display:flex;" aria-label="뒤로가기"><iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon></a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">리뷰 작성</h1>
      <div style="width:32px;"></div>
    </header>

    <div style="padding:16px;display:flex;flex-direction:column;gap:18px;">
      <!-- Product Info -->
      <div style="background:#FFFFFF;border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(62,39,35,0.05);">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="상품이미지" style="width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;">
        <div>
          <p style="font-size:13px;font-weight:600;color:#3E2723;">우림 전통 고추장 500g</p>
          <p style="font-size:11px;color:#A1887F;margin-top:2px;">주문 #20260410 · 구매확정</p>
        </div>
      </div>

      <!-- Star Rating -->
      <div style="background:#FFFFFF;border-radius:12px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(62,39,35,0.05);">
        <p style="font-size:13px;font-weight:600;color:#3E2723;margin-bottom:14px;">상품이 만족스러우셨나요?</p>
        <div style="display:flex;justify-content:center;gap:4px;margin-bottom:8px;" id="starRow">
          <button class="star-btn" onclick="setRating(1)" aria-label="별점 1">⭐</button>
          <button class="star-btn" onclick="setRating(2)" aria-label="별점 2">⭐</button>
          <button class="star-btn" onclick="setRating(3)" aria-label="별점 3">⭐</button>
          <button class="star-btn" onclick="setRating(4)" aria-label="별점 4">⭐</button>
          <button class="star-btn" onclick="setRating(5)" aria-label="별점 5">⭐</button>
        </div>
        <p id="ratingLabel" style="font-size:14px;font-weight:700;color:#FF6B35;">★★★★★ 매우 만족</p>
      </div>

      <!-- Text Review -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <label style="font-size:13px;font-weight:600;color:#3E2723;">리뷰 내용 <span style="color:#FF6B35;">*</span></label>
          <span id="textCount" style="font-size:11px;color:#A1887F;">0/2000</span>
        </div>
        <textarea class="form-textarea" rows="5" placeholder="상품의 품질, 맛, 포장 상태 등을 자세히 알려주세요. (최소 10자)" maxlength="2000" oninput="document.getElementById('textCount').textContent=this.value.length+'/2000'">전통 방식으로 만든 고추장이라 그런지 맛이 정말 깊고 좋습니다. 짜지 않고 적당한 매운맛으로 비빔밥에 넣어먹으니 최고였어요!</textarea>
      </div>

      <!-- Photo Upload (max 5) -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <p style="font-size:13px;font-weight:600;color:#3E2723;">사진 첨부</p>
          <span style="font-size:11px;color:#A1887F;">최대 5장 · 각 10MB 이하</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="photoGrid">
          <!-- 2 existing photos -->
          <div class="media-thumb">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="" style="width:100%;height:100%;object-fit:cover;">
            <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="this.closest('.media-thumb').remove()"><iconify-icon icon="mdi:close" width="10" style="color:#fff;"></iconify-icon></button>
          </div>
          <div class="media-thumb">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Doenjang.jpg" alt="" style="width:100%;height:100%;object-fit:cover;">
            <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="this.closest('.media-thumb').remove()"><iconify-icon icon="mdi:close" width="10" style="color:#fff;"></iconify-icon></button>
          </div>
          <div class="media-add" onclick="alert('갤러리에서 사진 선택')">
            <iconify-icon icon="mdi:camera-plus-outline" width="22" style="color:#A1887F;"></iconify-icon>
            <span style="font-size:10px;color:#A1887F;">2/5</span>
          </div>
        </div>
      </div>

      <!-- Video Upload (max 1, 30s / 50MB) -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <p style="font-size:13px;font-weight:600;color:#3E2723;">동영상 첨부</p>
          <span style="font-size:11px;color:#A1887F;">최대 1개 · 30초 · 50MB 이하</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div style="width:70px;height:70px;background:#1A1A2E;border-radius:10px;position:relative;overflow:hidden;flex-shrink:0;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="" style="width:100%;height:100%;object-fit:cover;opacity:0.6;">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
              <iconify-icon icon="mdi:play-circle" width="28" style="color:#FFFFFF;"></iconify-icon>
            </div>
            <div style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);border-radius:4px;padding:1px 5px;">
              <span style="font-size:10px;color:#fff;">0:14</span>
            </div>
            <button style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="this.parentElement.remove()"><iconify-icon icon="mdi:close" width="10" style="color:#fff;"></iconify-icon></button>
          </div>
          <p style="font-size:11px;color:#A1887F;line-height:1.5;">동영상 1개 업로드됨<br>MP4, MOV 형식 가능</p>
        </div>
      </div>

      <!-- Reward Notice -->
      <div style="background:#E8F5E9;border-radius:10px;padding:12px 14px;display:flex;gap:8px;align-items:flex-start;">
        <iconify-icon icon="mdi:gift-outline" width="18" style="color:#2E7D32;flex-shrink:0;margin-top:1px;"></iconify-icon>
        <div>
          <p style="font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:3px;">리뷰 작성 혜택</p>
          <p style="font-size:11px;color:#388E3C;line-height:1.6;">텍스트 리뷰: 50P · 사진 포함: 100P · 동영상 포함: 200P<br>포토/동영상 리뷰 작성 시 추가 100P 지급</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Fixed Bottom Bar -->
  <div class="bottom-bar">
    <button onclick="submitReview()" style="width:100%;background:#FF6B35;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;color:#FFFFFF;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(255,107,53,0.25);">
      리뷰 등록 (+200P 예정)
    </button>
  </div>
<script>
let currentRating = 5;
const labels = ['', '별로예요', '그저 그래요', '보통이에요', '좋아요', '매우 만족'];
function setRating(n) {
  currentRating = n;
  document.getElementById('ratingLabel').textContent = '★'.repeat(n) + '☆'.repeat(5-n) + ' ' + labels[n];
}
function submitReview() {
  alert('리뷰가 등록되었습니다!\n200P가 적립되었습니다.');
  window.location.href = '13-order-list.html';
}
</script>
</body>
</html>
