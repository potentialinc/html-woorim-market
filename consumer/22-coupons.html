<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우림마켓 - 쿠폰</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header { height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; position: sticky; top: 0; z-index: 10; }
  .filter-tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #A1887F; border: none; background: transparent; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; }
  .filter-tab.active { color: #FF6B35; border-bottom-color: #FF6B35; font-weight: 600; }
  .coupon-card {
    background: #FFFFFF; border-radius: 16px; margin: 0 16px 10px;
    box-shadow: 0 4px 12px rgba(62,39,35,0.06);
    display: flex; overflow: hidden;
  }
  .coupon-left {
    background: linear-gradient(135deg, #FF6B35, #FF8A80);
    padding: 16px; display: flex; flex-direction: column; justify-content: center;
    min-width: 90px; align-items: center; position: relative;
  }
  .coupon-left::after {
    content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; border-radius: 50%; background: #FFFBF5;
  }
  .coupon-right { padding: 14px 14px 14px 20px; flex: 1; }
</style>
</head>
<body>
<div class="phone-screen">
    <div style="height:36px;padding:10px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#FFFBF5;">
      <span style="font-size:13px;font-weight:600;color:#3E2723;">9:41</span>
      <div style="display:flex;gap:5px;align-items:center;"><iconify-icon icon="mdi:signal-cellular-3" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:wifi" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:battery" width="17" style="color:#3E2723;"></iconify-icon></div>
    </div>
    <header class="sub-header">
      <a href="18-mypage-main.html" style="padding:4px;display:flex;" aria-label="뒤로가기"><iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon></a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">쿠폰</h1>
      <div style="width:32px;"></div>
    </header>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #F0E0D0;background:#FFFFFF;" role="tablist">
      <button class="filter-tab active" onclick="filterCoupon(this)" role="tab">사용 가능 (3)</button>
      <button class="filter-tab" onclick="filterCoupon(this)" role="tab">만료 임박</button>
      <button class="filter-tab" onclick="filterCoupon(this)" role="tab">사용 완료</button>
      <button class="filter-tab" onclick="filterCoupon(this)" role="tab">만료됨</button>
    </div>

    <!-- Coupons List -->
    <div style="padding-top:14px;">
      <!-- Coupon 1 -->
      <div class="coupon-card">
        <div class="coupon-left">
          <p style="font-size:22px;font-weight:700;color:#FFFFFF;line-height:1;">5,000</p>
          <p style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px;">원 할인</p>
        </div>
        <div class="coupon-right">
          <p style="font-size:13px;font-weight:600;color:#3E2723;margin-bottom:4px;">신규 가입 할인 쿠폰</p>
          <p style="font-size:11px;color:#A1887F;margin-bottom:3px;">3만원 이상 구매 시</p>
          <p style="font-size:11px;color:#A1887F;">~2026.07.31</p>
        </div>
      </div>

      <!-- Coupon 2 (Expiring Soon) -->
      <div class="coupon-card">
        <div class="coupon-left" style="background:linear-gradient(135deg,#FF8A80,#FFAB91);">
          <p style="font-size:22px;font-weight:700;color:#FFFFFF;line-height:1;">15%</p>
          <p style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px;">할인</p>
        </div>
        <div class="coupon-right">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            <p style="font-size:13px;font-weight:600;color:#3E2723;">봄 시즌 특별 쿠폰</p>
            <span style="background:#FFEBEE;color:#E53935;font-size:10px;font-weight:700;padding:1px 6px;border-radius:9999px;">D-3</span>
          </div>
          <p style="font-size:11px;color:#A1887F;margin-bottom:3px;">5만원 이상 구매 시</p>
          <p style="font-size:11px;color:#E53935;font-weight:500;">~2026.04.19 (만료 임박)</p>
        </div>
      </div>

      <!-- Coupon 3 -->
      <div class="coupon-card">
        <div class="coupon-left" style="background:linear-gradient(135deg,#FFB300,#FFCA28);">
          <p style="font-size:22px;font-weight:700;color:#FFFFFF;line-height:1;">10,000</p>
          <p style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px;">원 할인</p>
        </div>
        <div class="coupon-right">
          <p style="font-size:13px;font-weight:600;color:#3E2723;margin-bottom:4px;">장류 기획전 특별 쿠폰</p>
          <p style="font-size:11px;color:#A1887F;margin-bottom:3px;">7만원 이상 구매 시</p>
          <p style="font-size:11px;color:#A1887F;">~2026.05.31</p>
        </div>
      </div>
    </div>
  </div>
<script>
function filterCoupon(el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
