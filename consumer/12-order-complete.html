<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="우림마켓 주문 완료">
<title>우림마켓 - 주문 완료</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .check-circle {
    width: 80px; height: 80px; border-radius: 50%; background: #E8F5E9;
    display: flex; align-items: center; justify-content: center;
    animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .btn-primary {
    width: 100%; height: 50px; background: #FF6B35; color: #FFFFFF;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; text-decoration: none;
    box-shadow: 0 4px 12px rgba(255,107,53,0.2);
  }
  .btn-outline {
    width: 100%; height: 50px; background: transparent; color: #6D4C41;
    border: 1.5px solid #F0E0D0; border-radius: 12px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: inherit; display: flex; align-items: center;
    justify-content: center; text-decoration: none;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="phone-screen">
    <main style="padding:48px 20px 32px;text-align:center;">
      <!-- Success Animation -->
      <div style="display:flex;justify-content:center;margin-bottom:24px;">
        <div class="check-circle">
          <iconify-icon icon="mdi:check-circle" width="48" style="color:#43A047;" aria-hidden="true"></iconify-icon>
        </div>
      </div>
      <h1 style="font-size:24px;font-weight:600;color:#3E2723;line-height:1.4;">주문이 완료되었습니다!</h1>
      <p style="font-size:13px;color:#A1887F;margin-top:8px;">주문번호 20260416-00142</p>

      <!-- Order Summary Card -->
      <div style="background:#FFFFFF;border-radius:16px;padding:16px;margin-top:24px;text-align:left;box-shadow:0 4px 12px rgba(62,39,35,0.06);">
        <!-- Product Thumbnails -->
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="우림 전통 고추장 500g" style="width:52px;height:52px;border-radius:10px;object-fit:cover;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Doenjang.jpg" alt="우림 된장 1kg" style="width:52px;height:52px;border-radius:10px;object-fit:cover;">
          <div style="width:52px;height:52px;border-radius:10px;background:#FFF5EB;display:flex;align-items:center;justify-content:center;font-size:11px;color:#A1887F;font-weight:500;">+0</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:14px;color:#6D4C41;">결제 금액</span>
          <span style="font-size:16px;font-weight:700;color:#3E2723;">27,600원</span>
        </div>
        <div style="height:1px;background:#F5EDE4;margin-bottom:10px;"></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <iconify-icon icon="mdi:truck-delivery-outline" width="16" style="color:#26A69A;"></iconify-icon>
          <span style="font-size:13px;color:#6D4C41;">배송 준비 중 · 주문 완료 후 1~3일 내 발송</span>
        </div>
      </div>

      <!-- Points Earned Info -->
      <div style="background:#FFF8E1;border-radius:12px;padding:10px 14px;margin-top:12px;display:flex;align-items:center;gap:8px;">
        <iconify-icon icon="mdi:star-circle-outline" width="18" style="color:#FFB300;"></iconify-icon>
        <span style="font-size:12px;color:#6D4C41;">구매확정 시 <strong style="color:#FF6B35;">276P</strong> 예정 적립</span>
      </div>

      <!-- Action Buttons -->
      <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px;">
        <a href="14-order-detail.html" class="btn-primary">주문 내역 확인</a>
        <a href="07-home.html" class="btn-outline">쇼핑 계속하기</a>
      </div>
    </main>
  </div>
</body>
</html>
