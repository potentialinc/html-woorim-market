<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공직 - 배송지 추가/편집</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header { height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; position: sticky; top: 0; z-index: 10; }
  .input-field { width: 100%; height: 48px; background: #FFFFFF; border: 1.5px solid #F0E0D0; border-radius: 12px; font-size: 14px; color: #3E2723; padding: 12px 16px; outline: none; transition: border-color 150ms; font-family: inherit; }
  .input-field:focus { border-color: #FF6B35; }
  .input-label { font-size: 13px; font-weight: 500; color: #6D4C41; margin-bottom: 6px; }
  .input-group { margin-bottom: 16px; }
  .btn-primary { width: 100%; height: 50px; background: #FF6B35; color: #FFFFFF; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .alias-chip { padding: 8px 16px; border-radius: 9999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #F0E0D0; background: #FFFFFF; color: #6D4C41; transition: all 150ms; }
  .alias-chip.selected { background: #FF6B35; color: #FFFFFF; border-color: #FF6B35; }
</style>
</head>
<body>
<div class="phone-screen">
    <div style="height:36px;padding:10px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#FFFBF5;">
      <span style="font-size:13px;font-weight:600;color:#3E2723;">9:41</span>
      <div style="display:flex;gap:5px;align-items:center;"><iconify-icon icon="mdi:signal-cellular-3" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:wifi" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:battery" width="17" style="color:#3E2723;"></iconify-icon></div>
    </div>
    <header class="sub-header">
      <a href="20-address-list.html" style="padding:4px;display:flex;" aria-label="뒤로가기"><iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon></a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">배송지 추가</h1>
      <button onclick="saveAddress()" style="background:none;border:none;color:#FF6B35;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">저장</button>
    </header>

    <main style="padding:20px 16px;">
      <div class="input-group">
        <label for="recipient" class="input-label">받는 분</label>
        <input id="recipient" type="text" class="input-field" placeholder="이름을 입력하세요" autocomplete="name">
      </div>
      <div class="input-group">
        <label for="phone" class="input-label">휴대폰 번호</label>
        <input id="phone" type="tel" class="input-field" placeholder="010-0000-0000" autocomplete="tel">
      </div>
      <div class="input-group">
        <label class="input-label">주소</label>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input type="text" class="input-field" placeholder="우편번호" id="zipcode" style="flex:1;" readonly>
          <button onclick="searchAddress()" style="padding:0 14px;background:#FF6B35;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;height:48px;font-family:inherit;">주소 검색</button>
        </div>
        <input type="text" class="input-field" placeholder="기본 주소" id="addr-main" readonly style="margin-bottom:8px;">
        <input type="text" class="input-field" placeholder="상세 주소 (동/호수 등)" id="addr-detail">
      </div>
      <div class="input-group">
        <label class="input-label">배송지 별칭 <span style="font-size:11px;font-weight:400;color:#A1887F;">(선택)</span></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="alias-chip selected" onclick="selectAlias(this)">집</button>
          <button class="alias-chip" onclick="selectAlias(this)">회사</button>
          <input type="text" class="input-field" placeholder="직접 입력" style="width:auto;flex:1;min-width:100px;">
        </div>
      </div>
    </main>

    <div style="position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:#FFFBF5;border-top:1px solid #F0E0D0;">
      <button class="btn-primary" onclick="saveAddress()">저장</button>
    </div>
  </div>
<script>
function selectAlias(el) {
  document.querySelectorAll('.alias-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
function searchAddress() {
  document.getElementById('zipcode').value = '12345';
  document.getElementById('addr-main').value = '경기도 이천시 영창로 23';
}
function saveAddress() { window.location.href = '20-address-list.html'; }
</script>
</body>
</html>
