<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="우림마켓 로그인">
<title>우림마켓 - 로그인</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header {
    height: 52px; background: #FFFBF5;
    border-bottom: 1px solid #E8DDD2;
    display: flex; align-items: center; justify-content: center;
    position: sticky; top: 0; z-index: 10;
    padding-top: 8px;
  }
  .sub-header-title { font-size: 16px; font-weight: 600; color: #3E2723; }
  .input-field {
    width: 100%; height: 48px;
    background: #FFFFFF; border: 1.5px solid #F0E0D0;
    border-radius: 12px; font-size: 14px; color: #3E2723;
    padding: 12px 16px; outline: none;
    transition: border-color 150ms ease;
    font-family: inherit;
  }
  .input-field::placeholder { color: #A1887F; }
  .input-field:focus { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
  .input-label { font-size: 13px; font-weight: 500; color: #6D4C41; margin-bottom: 6px; }
  .input-error { font-size: 12px; color: #E53935; margin-top: 4px; display: none; }
  .btn-primary {
    width: 100%; height: 50px;
    background: #FF6B35; color: #FFFFFF;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 12px rgba(255,107,53,0.2);
    transition: all 150ms ease-out;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: inherit;
  }
  .btn-primary:hover { background: #E85D2C; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(255,107,53,0.3); }
  .btn-primary:active { background: #D14F22; transform: translateY(0); }
  .divider-row {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
  }
  .divider-line { flex: 1; height: 1px; background: #F0E0D0; }
  .divider-text { font-size: 12px; color: #A1887F; white-space: nowrap; }
  .social-btn {
    width: 100%; height: 48px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity 150ms;
    font-family: inherit;
  }
  .social-btn:hover { opacity: 0.9; }
  .password-wrap { position: relative; }
  .password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
    display: flex; align-items: center;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="phone-screen">
    <!-- Sub Header -->
    <header class="sub-header">
      <h1 class="sub-header-title">로그인</h1>
    </header>

    <!-- Main Content -->
    <main style="padding:32px 20px;">
      <!-- Brand Block -->
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:32px;">
        <div style="width:56px;height:56px;background:linear-gradient(135deg,#FF6B35,#FF8A80);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(255,107,53,0.25);">
          <iconify-icon icon="mdi:store" width="30" style="color:#FFFFFF;" aria-hidden="true"></iconify-icon>
        </div>
        <p style="font-size:24px;font-weight:700;color:#3E2723;margin-top:12px;">우림마켓</p>
      </div>

      <!-- Form -->
      <form onsubmit="handleLogin(event)" novalidate>
        <!-- Email -->
        <div style="margin-bottom:16px;">
          <label for="email" class="input-label">이메일</label>
          <input id="email" type="email" class="input-field" placeholder="이메일을 입력하세요" autocomplete="email" aria-describedby="email-error">
          <p id="email-error" class="input-error" role="alert">올바른 이메일 형식을 입력해 주세요</p>
        </div>
        <!-- Password -->
        <div style="margin-bottom:24px;">
          <label for="password" class="input-label">비밀번호</label>
          <div class="password-wrap">
            <input id="password" type="password" class="input-field" placeholder="비밀번호를 입력하세요" autocomplete="current-password" aria-describedby="password-error" style="padding-right:48px;">
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="비밀번호 표시/숨기기">
              <iconify-icon icon="mdi:eye-off-outline" width="22" style="color:#A1887F;" id="pw-eye"></iconify-icon>
            </button>
          </div>
          <p id="password-error" class="input-error" role="alert">비밀번호를 입력해 주세요</p>
        </div>
        <!-- Login Button -->
        <button type="submit" class="btn-primary" id="login-btn">
          <span id="login-text">로그인</span>
          <iconify-icon icon="mdi:loading" width="20" style="display:none;" id="login-spinner"></iconify-icon>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider-row">
        <div class="divider-line"></div>
        <span class="divider-text">또는 소셜 로그인</span>
        <div class="divider-line"></div>
      </div>

      <!-- Social Login -->
      <button class="social-btn" style="background:#FEE500;color:#3C1E1E;" onclick="alert('카카오 로그인 연동 예정')">
        <iconify-icon icon="mdi:chat" width="22" aria-hidden="true"></iconify-icon>
        카카오로 시작하기
      </button>
      <button class="social-btn" style="background:#1D1D1F;color:#FFFFFF;margin-top:12px;" onclick="alert('Apple 로그인 연동 예정')">
        <iconify-icon icon="mdi:apple" width="22" aria-hidden="true"></iconify-icon>
        Apple로 시작하기
      </button>

      <!-- Footer Links -->
      <div style="margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:12px;">
        <p style="font-size:13px;color:#6D4C41;">계정이 없으신가요? <a href="03-register.html" style="color:#FF6B35;font-weight:600;text-decoration:underline;">회원가입</a></p>
        <a href="04-password-reset.html" style="font-size:13px;color:#FF6B35;font-weight:500;">비밀번호 찾기</a>
      </div>
    </main>
  </div>
<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('iconify-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.setAttribute('icon', 'mdi:eye-outline');
  } else {
    input.type = 'password';
    icon.setAttribute('icon', 'mdi:eye-off-outline');
  }
}
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  let valid = true;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('email-error').style.display = 'block';
    document.getElementById('email').style.borderColor = '#E53935';
    valid = false;
  } else {
    document.getElementById('email-error').style.display = 'none';
    document.getElementById('email').style.borderColor = '#F0E0D0';
  }
  if (!password) {
    document.getElementById('password-error').style.display = 'block';
    document.getElementById('password').style.borderColor = '#E53935';
    valid = false;
  } else {
    document.getElementById('password-error').style.display = 'none';
    document.getElementById('password').style.borderColor = '#F0E0D0';
  }
  if (!valid) return;
  // Simulate loading
  document.getElementById('login-text').textContent = '';
  document.getElementById('login-spinner').style.display = 'inline';
  setTimeout(() => {
    window.location.href = '07-home.html';
  }, 1000);
}
</script>
</body>
</html>
