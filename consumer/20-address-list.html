<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공직 - 배송지 관리</title>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
  html, body { height: 100%; background: #FFFBF5; }
  .phone-screen { max-width: 375px; margin: 0 auto; min-height: 100vh; overflow-y: auto; scrollbar-width: none; position: relative; }
  .sub-header { height: 52px; background: #FFFBF5; border-bottom: 1px solid #E8DDD2; display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 0; position: sticky; top: 0; z-index: 10; margin: 0 -16px; }
  .address-card { background: #FFFFFF; border-radius: 16px; padding: 16px; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(62,39,35,0.06); }
  .btn-sm { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid #F0E0D0; background: #FFFFFF; color: #6D4C41; font-family: inherit; }
  .btn-sm-danger { color: #E53935; border-color: #FFCDD2; }
</style>
</head>
<body>
<div class="phone-screen">
    <div style="height:36px;padding:10px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#FFFBF5;margin:0 -16px;">
      <span style="font-size:13px;font-weight:600;color:#3E2723;">9:41</span>
      <div style="display:flex;gap:5px;align-items:center;"><iconify-icon icon="mdi:signal-cellular-3" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:wifi" width="13" style="color:#3E2723;"></iconify-icon><iconify-icon icon="mdi:battery" width="17" style="color:#3E2723;"></iconify-icon></div>
    </div>
    <header class="sub-header">
      <a href="18-mypage-main.html" style="padding:4px;display:flex;" aria-label="뒤로가기"><iconify-icon icon="ic:round-arrow-back" width="24" style="color:#3E2723;"></iconify-icon></a>
      <h1 style="font-size:16px;font-weight:600;color:#3E2723;">배송지 관리</h1>
      <a href="21-address-edit.html" style="color:#FF6B35;font-size:14px;font-weight:500;text-decoration:none;">추가</a>
    </header>

    <div style="margin-top:14px;">
      <!-- Address 1 (Default) -->
      <div class="address-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="background:#FFF0E8;color:#FF6B35;font-size:11px;font-weight:600;padding:2px 8px;border-radius:9999px;">기본</span>
          <p style="font-size:14px;font-weight:600;color:#3E2723;">김우림</p>
          <p style="font-size:13px;color:#6D4C41;">010-1234-5678</p>
        </div>
        <p style="font-size:13px;color:#3E2723;line-height:1.5;">[12345] 경기도 이천시 영창로 23</p>
        <p style="font-size:13px;color:#A1887F;">우림아파트 101동 505호</p>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-sm" disabled style="opacity:0.4;cursor:not-allowed;">기본 설정</button>
          <a href="21-address-edit.html" class="btn-sm" style="text-decoration:none;">편집</a>
          <button class="btn-sm btn-sm-danger">삭제</button>
        </div>
      </div>

      <!-- Address 2 -->
      <div class="address-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <p style="font-size:14px;font-weight:600;color:#3E2723;">우림 엄마</p>
          <p style="font-size:13px;color:#6D4C41;">010-9876-5432</p>
        </div>
        <p style="font-size:13px;color:#3E2723;line-height:1.5;">[67890] 경기도 수원시 팔달구 화서동 123</p>
        <p style="font-size:13px;color:#A1887F;">수원아파트 203동 1102호</p>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-sm" onclick="alert('기본 배송지로 설정되었습니다')">기본 설정</button>
          <a href="21-address-edit.html" class="btn-sm" style="text-decoration:none;">편집</a>
          <button class="btn-sm btn-sm-danger">삭제</button>
        </div>
      </div>

      <!-- Add Button -->
      <a href="21-address-edit.html" style="display:flex;align-items:center;justify-content:center;gap:8px;background:#FFFFFF;border-radius:16px;padding:16px;text-decoration:none;border:1.5px dashed #F0E0D0;">
        <iconify-icon icon="mdi:plus-circle-outline" width="22" style="color:#FF6B35;"></iconify-icon>
        <span style="font-size:14px;font-weight:500;color:#FF6B35;">배송지 추가</span>
      </a>

      <!-- Max Notice -->
      <div style="background:#FFF8E1;border-radius:10px;padding:10px 14px;margin-top:10px;display:flex;align-items:center;gap:8px;">
        <iconify-icon icon="mdi:information-outline" width="16" style="color:#F57F17;"></iconify-icon>
        <p style="font-size:12px;color:#F57F17;">배송지는 최대 5개까지 등록 가능합니다 (2/5)</p>
      </div>
    </div>
  </div>
</body>
</html>
