<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우림마켓 - 카테고리 (Variation E: Nature Organic)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif; }
  html, body { height: 100%; background: #e5e5e5; }
  .phone-frame {
    width: 375px; height: 812px; margin: 24px auto;
    background: #F5F0EB; color: #2D2A26;
    border-radius: 40px; border: 3px solid #2a2a3a;
    overflow: hidden; position: relative;
    box-shadow: 0 0 80px rgba(0,0,0,0.4), 0 20px 60px rgba(0,0,0,0.6);
  }
  .phone-screen { height: 100%; overflow-y: auto; padding-bottom: 80px; scrollbar-width: none; }
  .phone-screen::-webkit-scrollbar { display: none; }
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 100; }
  .phone-frame::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 28px; background: #F5F0EB;
    border-radius: 0 0 18px 18px; z-index: 200;
  }
  .font-serif { font-family: 'Noto Serif KR', 'Georgia', serif; }
  .card { background: #FEFCF9; border-radius: 10px; box-shadow: 0 2px 4px rgba(45,42,38,0.04), 0 4px 12px rgba(45,42,38,0.04); }
  .product-img { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .product-img span { position: absolute; z-index: 1; }
  .product-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; }
</style>
</head>
<body>
<!-- Variation Navigation Bar -->
<div class="var-nav-bar" style="position:fixed;top:12px;right:12px;z-index:9999;display:flex;gap:4px;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);padding:6px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);font-family:Inter,-apple-system,sans-serif;">
  <span style="padding:6px 10px;font-size:13px;font-weight:800;color:rgba(255,255,255,0.4);">E</span>
  <a href="E-01-home.html" style="padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;color:#888;background:transparent;">홈</a>
  <a href="E-02-category.html" style="padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;color:#fff;background:rgba(255,255,255,0.15);">카테고리</a>
  <a href="E-03-product-detail.html" style="padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;color:#888;background:transparent;">상품상세</a>
  <a href="E-04-admin-dashboard.html" style="padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;text-decoration:none;color:#888;background:transparent;">어드민</a>
  <a href="showcase-ALL.html" style="padding:6px 10px;border-radius:8px;font-size:12px;text-decoration:none;color:#666;">✕</a>
</div>
<div class="phone-frame">
  <div class="phone-screen">
    <!-- Status Bar -->
    <div style="height:48px;padding:14px 20px 0;display:flex;justify-content:space-between;align-items:center;background:#FEFCF9;">
      <span style="font-size:14px;font-weight:600;color:#2D2A26;">9:41</span>
      <div style="display:flex;gap:5px;align-items:center;color:#2D2A26;">
        <iconify-icon icon="mdi:signal-cellular-3" width="14"></iconify-icon>
        <iconify-icon icon="mdi:wifi" width="14"></iconify-icon>
        <iconify-icon icon="mdi:battery" width="18"></iconify-icon>
      </div>
    </div>

    <!-- Header -->
    <header style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#FEFCF9;border-bottom:1px solid #E5DFD8;box-shadow:0 1px 4px rgba(45,42,38,0.04);z-index:10;flex-shrink:0;">
      <button style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;">
        <iconify-icon icon="ic:round-arrow-back" width="22" style="color:#5C5650;"></iconify-icon>
      </button>
      <h1 style="font-size:18px;font-weight:700;color:#2D2A26;">카테고리</h1>
      <div style="display:flex;gap:4px;">
        <button style="position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;">
          <iconify-icon icon="mdi:bell-outline" width="22" style="color:#5C5650;"></iconify-icon>
          <span style="position:absolute;top:0;right:0;width:7px;height:7px;background:#FF4444;border-radius:50%;"></span>
        </button>
        <button style="position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;">
          <iconify-icon icon="mdi:cart-outline" width="22" style="color:#5C5650;"></iconify-icon>
          <span style="position:absolute;top:-4px;right:-6px;background:#C4704B;color:#FFF;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;">2</span>
        </button>
      </div>
    </header>

    
    <!-- Sort -->
    <div style="padding: 10px 16px; display: flex; justify-content: flex-end;">
      <div style="background: #FEFCF9; border: 1.5px solid #DDD5CC; border-radius: 8px; padding: 6px 14px; display: flex; align-items: center; gap: 6px;">
        <span style="font-size: 13px; color: #5C5650;">인기순</span>
        <iconify-icon icon="mdi:chevron-down" style="font-size: 16px; color: #8C847C;"></iconify-icon>
      </div>
    </div>

    <!-- Layout -->
    <div style="display: flex; height: 560px; overflow: hidden;">
      <!-- Left Sidebar -->
      <div style="width: 80px; min-width: 80px; background: #FEFCF9; border-right: 1px solid #E8E0D8; overflow-y: auto;">
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5B7553; font-weight: 500; background: #EFF4ED; border-left: 3px solid #5B7553;">소스류</div>
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5C5650;">장류</div>
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5C5650;">음료</div>
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5C5650;">간편식</div>
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5C5650;">건강식품</div>
        <div style="padding: 14px 0; text-align: center; font-size: 12px; color: #5C5650;">간식</div>
      </div>

      <!-- Right Grid -->
      <div style="flex: 1; overflow-y: auto; padding: 0 10px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 80px;">
          <!-- 고추장 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Korean_chili_pepper_paste_GOCHUJANG.jpg" alt="우림 전통 고추장" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">우림 전통 고추장 500g</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">12,000원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">26%</span>
                <span style="font-size: 14px; font-weight: 600;">8,900원</span>
              </div>
            </div>
          </div>
          <!-- 양념소스 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/Cheongyang_chili_and_gochujang.jpg" alt="매콤 양념소스" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">매콤 양념소스 300ml</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">8,500원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">31%</span>
                <span style="font-size: 14px; font-weight: 600;">5,900원</span>
              </div>
            </div>
          </div>
          <!-- 쌈장 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/Ssam_vegetables_and_ssamjang.jpg" alt="우림 쌈장" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">우림 쌈장 450g</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">9,000원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">31%</span>
                <span style="font-size: 14px; font-weight: 600;">6,200원</span>
              </div>
            </div>
          </div>
          <!-- 핫소스 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Gochujang_%28chilli_paste%29.jpg" alt="청양고추 핫소스" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">청양고추 핫소스 250ml</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">7,500원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">35%</span>
                <span style="font-size: 14px; font-weight: 600;">4,900원</span>
              </div>
            </div>
          </div>
          <!-- 식초 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/db/Korean_Rice_Vinegar.jpg" alt="유기농 현미식초" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">유기농 현미식초 500ml</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">13,000원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">35%</span>
                <span style="font-size: 14px; font-weight: 600;">8,500원</span>
              </div>
            </div>
          </div>
          <!-- 맛간장 -->
          <div class="card" style="overflow: hidden;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Bowl_of_soy_sauce.jpg" alt="전통 맛간장" style="width:100%;aspect-ratio:1;object-fit:cover;">
            <div style="padding: 10px;">
              <div style="font-size: 12px; margin-bottom: 2px;">전통 맛간장 300ml</div>
              <div style="font-size: 11px; color: #8C847C; text-decoration: line-through;">10,000원</div>
              <div style="display: flex; align-items: center; gap: 4px;">
                <span style="font-size: 13px; color: #C4704B; font-weight: 600;">32%</span>
                <span style="font-size: 14px; font-weight: 600;">6,800원</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="bottom-bar" style="background: #FEFCF9; border-top: 1px solid #DDD5CC; display: flex; align-items: center; justify-content: space-around; height: 56px;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
      <iconify-icon icon="mdi:home-outline" style="font-size: 22px; color: #8C847C;"></iconify-icon>
      <span style="font-size: 11px; color: #8C847C; font-weight: 500;">홈</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
      <iconify-icon icon="mdi:view-grid" style="font-size: 22px; color: #5B7553;"></iconify-icon>
      <span style="font-size: 11px; color: #5B7553; font-weight: 500;">카테고리</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
      <iconify-icon icon="mdi:receipt-text-outline" style="font-size: 22px; color: #8C847C;"></iconify-icon>
      <span style="font-size: 11px; color: #8C847C; font-weight: 500;">주문내역</span>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
      <iconify-icon icon="mdi:account-circle-outline" style="font-size: 22px; color: #8C847C;"></iconify-icon>
      <span style="font-size: 11px; color: #8C847C; font-weight: 500;">마이페이지</span>
    </div>
  </div>
</div>
</body>
</html>
